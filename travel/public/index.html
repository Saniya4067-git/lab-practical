<!DOCTYPE html>
<html>
<head>
    <title>Tourist Places of India</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-4">
    <h1 class="text-center">Tourist Places of India</h1>

    <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">

        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="images/taj.jpg" class="d-block w-100">
                <div class="carousel-caption">
                    <h3>Taj Mahal</h3>
                    <p>Agra - Symbol of Love</p>
                </div>
            </div>

            <div class="carousel-item">
                <img src="images/goa.jpg" class="d-block w-100">
                <div class="carousel-caption">
                    <h3>Goa</h3>
                    <p>Famous for Beaches</p>
                </div>
            </div>

            <div class="carousel-item">
                <img src="images/kerala.jpg" class="d-block w-100">
                <div class="carousel-caption">
                    <h3>Kerala</h3>
                    <p>God’s Own Country</p>
                </div>
            </div>

            <div class="carousel-item">
                <img src="images/jaipur.jpg" class="d-block w-100">
                <div class="carousel-caption">
                    <h3>Jaipur</h3>
                    <p>Pink City</p>
                </div>
            </div>

        </div>

        <button class="carousel-control-prev" data-bs-target="#carouselExample" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" data-bs-target="#carouselExample" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
