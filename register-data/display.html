<!DOCTYPE html>
<html>
<head>
    <title>Registered Users</title>
    <style>
        body {
            font-family: Arial;
            background: #eef;
        }
        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            background: white;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }
        th {
            background: #4CAF50;
            color: white;
        }
        h2 {
            text-align: center;
        }
    </style>
</head>

<body>

<h2>Registered Users</h2>

<table>
    <tr>
        <th>First Name</th>
        <th>Last Name</th>
        <th>DOB</th>
        <th>Gender</th>
        <th>Mobile</th>
        <th>Email</th>
    </tr>
    <tbody id="data"></tbody>
</table>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [];

let output = "";

users.forEach(user => {
    output += `
    <tr>
        <td>${user.fname}</td>
        <td>${user.lname}</td>
        <td>${user.dob}</td>
        <td>${user.gender}</td>
        <td>${user.mobile}</td>
        <td>${user.email}</td>
    </tr>`;
});

document.getElementById("data").innerHTML = output;
</script>

</body>
</html>
